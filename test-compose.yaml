services:
  caddy-hostnames:
    build:
      dockerfile: ./Dockerfile
    environment:
      PUBLISHED_IP: 192.168.20.178
      MDNS_REGISTER_CONCURRENCY: "32"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: host
    restart: unless-stopped

  nginx1:
    image: nginx:alpine
    container_name: nginx1
    labels:
      caddy_0: nginx1.local
      caddy_0.reverse_proxy: "{{upstreams 80}}"
    restart: unless-stopped

  nginx2:
    image: nginx:alpine
    container_name: nginx2
    labels:
      caddy_0: nginx2.local
      caddy_0.reverse_proxy: "{{upstreams 80}}"
    restart: unless-stopped
